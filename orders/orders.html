<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders - FreshNut</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/footer.css" />
  <link rel="stylesheet" href="./orders.css" />
</head>
<body>
  <header id="app-navbar"></header>

  <main class="orders-page">
    <section class="orders-head">
      <h1>My Orders</h1>
      <p>Track your purchases and order history.</p>
    </section>

    <section class="orders-controls">
      <input id="orderSearch" type="search" placeholder="Search by order id or product..." />
      <select id="orderStatusFilter">
        <option value="">All Status</option>
        <option value="placed">Placed</option>
        <option value="processing">Processing</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
        <option value="return_requested">Return Requested</option>
      </select>
    </section>

    <section id="ordersList" class="orders-list"></section>
  </main>

  <footer id="app-footer"></footer>

  <script>
    async function loadPartials() {
      const navRes = await fetch("../partials/navbar.html");
      document.getElementById("app-navbar").innerHTML = await navRes.text();

      const footRes = await fetch("../partials/footer.html");
      document.getElementById("app-footer").innerHTML = await footRes.text();

      const s = document.createElement("script");
      s.src = "../app.js";
      s.onload = () => {
        window.initNavbar?.();
        window.initAccount?.();
        window.initDrawers?.();
      };
      document.body.appendChild(s);
    }
    loadPartials();
  </script>

  <script src="./orders.js"></script>
</body>
</html>
