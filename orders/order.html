<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Details - FreshNut</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/footer.css" />
  <link rel="stylesheet" href="./order.css" />
</head>
<body>
  <header id="app-navbar"></header>

  <main class="order-page" id="orderPage"></main>

  <footer id="app-footer"></footer>

  <script>
    async function loadPartials() {
      const navRes = await fetch("../partials/navbar.html");
      document.getElementById("app-navbar").innerHTML = await navRes.text();

      const footRes = await fetch("../partials/footer.html");
      document.getElementById("app-footer").innerHTML = await footRes.text();

      const s = document.createElement("script");
      s.src = "../app.js";
      s.onload = () => {
        window.initNavbar?.();
        window.initAccount?.();
        window.initDrawers?.();
      };
      document.body.appendChild(s);
    }
    loadPartials();
  </script>

  <script src="./order.js"></script>
</body>
</html>
